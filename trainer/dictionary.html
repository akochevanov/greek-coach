<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dictionary</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
      background: #f8f6f2;
      color: #1a1a1a;
    }
    .top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .back-link {
      text-decoration: none;
      color: #000;
      font-size: 1.2rem;
      line-height: 1;
      white-space: nowrap;
    }
    .search-wrap {
      margin: 0 0 14px;
    }
    .search-input {
      width: 100%;
      border: 1px solid #d7d7d7;
      border-radius: 10px;
      font-size: 1rem;
      padding: 10px 12px;
      background: #fff;
      color: #1a1a1a;
    }
    .search-input:focus {
      outline: 2px solid #9ec5ff;
      outline-offset: 1px;
      border-color: #9ec5ff;
    }
    .section {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      padding: 16px;
      margin-bottom: 14px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .section-title .chevron {
      font-size: 0.95rem;
      color: #444;
      flex: 0 0 auto;
    }
    .section.collapsed table {
      display: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.96rem;
      line-height: 1.35;
    }
    th, td {
      width: 50%;
    }
    th, td {
      border: 1px solid #e5e5e5;
      text-align: left;
      vertical-align: top;
      padding: 8px 10px;
    }
    .transcription {
      color: rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div class="top">
    <a class="back-link" href="./index.html" aria-label="Назад к тренажеру">←</a>
    <h1>Dictionary</h1>
  </div>
  <div class="search-wrap">
    <input
      id="word-search"
      class="search-input"
      type="search"
      placeholder="Поиск..."
      aria-label="Поиск слов"
      autocomplete="off"
    >
  </div>
  <div id="dictionary-sections"></div>
  <script>
    const dataPath = "data/dictionary-words.json";
    const transcriptionPattern = /\s\(([^()]+)\)$/;
    const greekCollator = new Intl.Collator("el", { sensitivity: "base" });
    const stripTranscription = (text) => text.replace(transcriptionPattern, "").trim();
    const normalizeSearchText = (text) => text
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "");

    function createSectionElement(sectionData) {
      const section = document.createElement("section");
      section.className = "section";
      const h2 = document.createElement("h2");
      h2.className = "section-title";
      const heading = document.createElement("span");
      heading.textContent = sectionData.subtitle
        ? `${sectionData.title} (${sectionData.subtitle})`
        : sectionData.title;
      const chevron = document.createElement("span");
      chevron.className = "chevron";
      chevron.setAttribute("aria-hidden", "true");
      chevron.textContent = "▴";
      h2.append(heading, chevron);

      const table = document.createElement("table");
      const tbody = document.createElement("tbody");
      for (const entry of sectionData.entries || []) {
        const row = document.createElement("tr");
        const tdEl = document.createElement("td");
        const tdRu = document.createElement("td");
        tdEl.textContent = entry.el || "";
        tdRu.textContent = entry.ru || "";
        row.append(tdEl, tdRu);
        tbody.append(row);
      }
      table.append(tbody);
      section.append(h2, table);
      return section;
    }

    function sortRowsInSection(section) {
      const tbody = section.querySelector("tbody");
      if (!tbody) return;
      const rows = Array.from(tbody.querySelectorAll("tr"));
      rows.sort((a, b) => {
        const aText = stripTranscription(a.querySelector("td")?.textContent ?? "");
        const bText = stripTranscription(b.querySelector("td")?.textContent ?? "");
        return greekCollator.compare(aText, bText);
      });
      for (const row of rows) tbody.append(row);
    }

    function styleTranscriptions() {
      const wordCells = document.querySelectorAll("tbody tr td:first-child");
      for (const cell of wordCells) {
        const text = cell.textContent.trim();
        const match = text.match(transcriptionPattern);
        if (!match) continue;
        const base = text.replace(transcriptionPattern, "");
        cell.textContent = "";
        cell.append(document.createTextNode(`${base} `));
        const transcription = document.createElement("span");
        transcription.className = "transcription";
        transcription.textContent = `(${match[1]})`;
        cell.append(transcription);
      }
    }

    function setupSectionToggle(section) {
      const title = section.querySelector(".section-title");
      const chevron = section.querySelector(".chevron");
      if (!title || !chevron) return;
      title.setAttribute("role", "button");
      title.setAttribute("tabindex", "0");
      title.setAttribute("aria-expanded", "true");

      const toggle = () => {
        const isCollapsed = section.classList.toggle("collapsed");
        chevron.textContent = isCollapsed ? "▾" : "▴";
        title.setAttribute("aria-expanded", String(!isCollapsed));
      };

      title.addEventListener("click", toggle);
      title.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          toggle();
        }
      });
    }

    function setupSearch(sections) {
      const searchInput = document.querySelector("#word-search");
      if (!searchInput) return;

      const filterRows = () => {
        const query = normalizeSearchText(searchInput.value.trim());
        for (const section of sections) {
          const rows = section.querySelectorAll("tbody tr");
          let hasVisibleRows = false;
          for (const row of rows) {
            const rowText = normalizeSearchText(row.textContent ?? "");
            const isVisible = query === "" || rowText.includes(query);
            row.style.display = isVisible ? "" : "none";
            if (isVisible) hasVisibleRows = true;
          }
          section.style.display = hasVisibleRows ? "" : "none";
        }
      };

      searchInput.addEventListener("input", filterRows);
      filterRows();
    }

    async function bootstrapDictionary() {
      const container = document.querySelector("#dictionary-sections");
      if (!container) return;
      try {
        const res = await fetch(dataPath, { cache: "no-store" });
        if (!res.ok) throw new Error("Не удалось загрузить словарь.");
        const payload = await res.json();
        if (!Array.isArray(payload.sections)) throw new Error("Неверный формат словаря.");

        const sections = payload.sections.map(createSectionElement);
        for (const section of sections) {
          sortRowsInSection(section);
          container.append(section);
          setupSectionToggle(section);
        }

        styleTranscriptions();
        setupSearch(sections);
      } catch (error) {
        container.innerHTML = `<section class="section"><p>Ошибка загрузки словаря: ${error.message}</p></section>`;
      }
    }

    bootstrapDictionary();
  </script>
</body>
</html>
